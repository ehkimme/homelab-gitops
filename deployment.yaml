apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaultwarden
  namespace: vaultwarden
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: { app: vaultwarden }
  template:
    metadata:
      labels: { app: vaultwarden }
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: vaultwarden
          image: vaultwarden/server:1.32.5
          ports:
            - containerPort: 80
          env:
            - name: DOMAIN
              value: http://localhost:8081
            - name: SIGNUPS_ALLOWED
              value: "true"
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet: { path: /alive, port: 80 }
            initialDelaySeconds: 10
          readinessProbe:
            httpGet: { path: /alive, port: 80 }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: vaultwarden-data
